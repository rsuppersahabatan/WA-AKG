name: Docker Build

on:
  push:
    branches: [main, dev]
    paths:
      - Dockerfile
      - docker-compose.yml
      - package.json
      - package-lock.json
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - package.json
      - package-lock.json
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: wa-akg:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker image inspect wa-akg:ci-${{ github.sha }} | head -30
